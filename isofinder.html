<style>
:root{--bg:#0a0e17;--bg2:#111827;--bg3:#1a2236;--accent:#00e5ff;--accent2:#ff3d71;--accent3:#ffc644;--green:#22c55e;--text:#e2e8f0;--text2:#8892a4;--border:#2a3550;--glass:rgba(17,24,39,.92);--r:10px;--pw:370px;--th:64px}*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text)}#map{position:absolute;inset:0;z-index:1}.tb{position:absolute;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;gap:10px;padding:10px 14px;height:var(--th);background:linear-gradient(180deg,rgba(10,14,23,.97) 60%,transparent);pointer-events:none}.tb>*{pointer-events:all}.logo{font-family:'DM Mono',monospace;font-weight:500;font-size:16px;color:var(--accent);white-space:nowrap;flex-shrink:0}.logo span{color:var(--text2);font-weight:300;font-size:12px}.ctrls{display:flex;gap:6px;flex:1;min-width:0}.ig{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s;min-width:0}.ig:focus-within{border-color:var(--accent)}.ig label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);padding:0 8px;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}.ig input{background:0 0;border:none;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:13px;padding:9px 8px 9px 0;outline:none;width:100%;min-width:0}.ig input::placeholder{color:var(--text2);opacity:.5}input[type=number]::-webkit-inner-spin-button{opacity:.3}.ig-l{flex:2.5;min-width:120px}.ig-d{flex:1;min-width:90px}.btn{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;padding:9px 14px;border:none;border-radius:var(--r);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}.btn-go{background:var(--accent);color:var(--bg)}.btn-go:hover{background:#33ecff}.btn-go:disabled{opacity:.4;cursor:not-allowed}.btn-m{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:9px 10px;font-size:16px;line-height:1}.btn-m:hover{border-color:var(--accent)}.pnl{position:absolute;top:var(--th);right:0;bottom:0;width:var(--pw);z-index:1000;background:var(--glass);backdrop-filter:blur(24px);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1)}.pnl.shut{transform:translateX(100%)}.ph{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}.ph h3{font-size:13px;font-weight:600;color:var(--accent);font-family:'DM Mono',monospace}.px{background:0 0;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:6px}.px:hover{background:var(--bg3);color:var(--text)}.ps{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch}.ps::-webkit-scrollbar{width:3px}.ps::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}.sec{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin:16px 0 8px}.sec:first-child{margin-top:0}.st{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(42,53,80,.4)}.sl{font-size:12px;color:var(--text2)}.sv{font-family:'DM Mono',monospace;font-size:12px}.pc{padding:9px 11px;margin:5px 0;background:var(--bg3);border-radius:8px;border-left:3px solid var(--accent3);cursor:pointer;transition:all .12s}.pc:hover{background:#1f2d47;transform:translateX(2px)}.pc .pn{font-size:12px;font-weight:600}.pc .pd{font-size:10px;color:var(--text2);margin-top:2px;font-family:'DM Mono',monospace}.er{display:flex;gap:5px;margin-top:10px}.er .btn{flex:1;font-size:10px;padding:7px 4px;text-align:center;background:var(--bg3);color:var(--text);border:1px solid var(--border)}.er .btn:hover{border-color:var(--accent);color:var(--accent)}.ds-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin:8px 0}.ds-card h4{font-size:12px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}.ds-card h4 .badge{font-size:9px;padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-weight:400}.ds-card p{font-size:11px;color:var(--text2);line-height:1.5;margin:4px 0}.ds-card .cb{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin:8px 0;font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);cursor:pointer;position:relative;transition:all .15s;user-select:all;word-break:break-all}.ds-card .cb:hover{border-color:var(--accent)}.ds-card .cb .ch{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--text2)}.ds-card .cb.cp{border-color:var(--green);color:var(--green)}.ds-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--accent);text-decoration:none;padding:6px 10px;border:1px solid var(--accent);border-radius:6px;margin:4px 4px 0 0;transition:all .15s;font-family:'DM Mono',monospace}.ds-link:hover{background:rgba(0,229,255,.1)}.ds-steps{margin:8px 0;padding-left:0;list-style:none;counter-reset:step}.ds-steps li{font-size:11px;color:var(--text2);line-height:1.6;padding:3px 0 3px 24px;position:relative;counter-increment:step}.ds-steps li::before{content:counter(step);position:absolute;left:0;top:3px;width:18px;height:18px;border-radius:50%;background:var(--bg);border:1px solid var(--border);font-family:'DM Mono',monospace;font-size:9px;display:flex;align-items:center;justify-content:center;color:var(--accent)}.drop{border:2px dashed var(--border);border-radius:8px;padding:18px 10px;text-align:center;transition:all .15s;cursor:pointer;margin:8px 0}.drop:hover,.drop.ov{border-color:var(--accent);background:rgba(0,229,255,.04)}.drop p{font-size:11px;color:var(--text2);margin:2px 0}.tst{position:absolute;bottom:14px;left:14px;z-index:1000;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:10px;padding:9px 14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:8px;transition:all .3s;max-width:calc(100vw - 28px)}.tst.ok{border-color:var(--green);color:var(--green)}.tst.err{border-color:var(--accent2);color:var(--accent2)}.tst.hi{opacity:0;pointer-events:none;transform:translateY(8px)}.sp{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}@keyframes sp{to{transform:rotate(360deg)}}.lgd{position:absolute;bottom:14px;right:14px;z-index:999;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:11px;min-width:155px}.lgd.po{right:calc(var(--pw) + 14px)}.lr{display:flex;align-items:center;gap:7px;margin:3px 0}.ll{width:20px;height:3px;border-radius:2px}.depth-bar{width:100%;height:12px;border-radius:3px;margin:6px 0 2px}.depth-labels{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:9px;color:var(--text2)}.opa-row{display:flex;align-items:center;gap:8px;margin:6px 0 2px}.opa-row label{font-size:9px;color:var(--text2);font-family:'DM Mono',monospace;white-space:nowrap}.opa-row input[type=range]{flex:1;height:4px;-webkit-appearance:none;background:var(--border);border-radius:2px;outline:none}.opa-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}@media(max-width:768px){:root{--pw:100vw;--th:auto}.tb{flex-wrap:wrap;padding:8px 10px;gap:6px;height:auto}.logo{width:100%;font-size:14px}.logo span{display:none}.ctrls{flex-wrap:wrap}.ig-l{flex:1 1 100%}.ig-d{flex:1}.btn-go{flex:1}.pnl{top:0;width:100vw;border-left:none}.lgd{bottom:8px;right:8px;max-width:180px}.tst{bottom:8px;left:8px;right:8px;max-width:none;font-size:10px}}@media(min-width:769px)and(max-width:1100px){:root{--pw:320px}}.leaflet-popup-content-wrapper{background:var(--bg2)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:8px!important;font-family:'DM Mono',monospace!important;font-size:11px!important}.leaflet-popup-tip{background:var(--bg2)!important}.leaflet-popup-close-button{color:var(--text2)!important}
</style>

<body>
<div id="map"></div>
<div class="tb"><div class="logo">IsoFinder <span>// bathymetric isobath explorer</span></div><div class="ctrls"><div class="ig ig-l"><label>Lieu</label><input type="text" id="inLoc" placeholder="Suruga Bay, Japan" value="Suruga Bay, Japan"></div><div class="ig ig-d"><label>Prof</label><input type="number" id="inD" value="651" min="1" max="11000"><label style="padding-right:8px">m</label></div><button class="btn btn-go" id="btnGo" onclick="go()">Rechercher</button><button class="btn btn-m" onclick="tp()">☰</button></div></div>
<div class="pnl shut" id="pnl"><div class="ph"><h3>// DONNÉES</h3><button class="px" onclick="tp()">✕</button></div><div class="ps"><div class="sec">1 — Obtenir les données</div><div id="dsA"><p style="font-size:11px;color:var(--text2)">Cliquez "Rechercher" pour générer les liens.</p></div><div class="sec">2 — Charger le fichier</div><div class="drop" id="dz" onclick="document.getElementById('fIn').click()"><div style="font-size:24px;margin-bottom:4px">📂</div><p>Glisser le fichier ici</p><p style="font-size:10px;opacity:.6">CSV · ASC · XYZ</p></div><input type="file" id="fIn" accept=".csv,.asc,.xyz" style="display:none" onchange="hFile(event)"><div id="rA"></div></div></div>
<div class="tst hi" id="tst"><div class="sp" id="tSp"></div><span id="tMsg"></span></div>
<div class="lgd" id="lgd" style="display:none">
  <div class="lr"><div class="ll" style="background:var(--accent2)"></div><span style="color:var(--text2)" id="lgT">Isobathe 651m</span></div>
  <div class="lr"><div class="ll" style="background:rgba(255,255,255,.3)"></div><span style="color:var(--text2)">Isobathes réf.</span></div>
  <div class="lr"><div style="width:8px;height:8px;border-radius:50%;background:var(--accent3)"></div><span style="color:var(--text2)">Ports</span></div>
  <div id="dLeg" style="display:none;margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
    <div style="font-size:9px;color:var(--text2);font-family:'DM Mono',monospace;margin-bottom:4px">PROFONDEUR</div>
    <div class="depth-bar" id="dBar"></div>
    <div class="depth-labels"><span id="dL0">0m</span><span id="dL1"></span><span id="dL2"></span></div>
    <div class="opa-row"><label>Opacité</label><input type="range" min="0" max="100" value="60" id="oS" oninput="setOp(this.value)"></div>
  </div>
</div>
<script>
let G=null,IL=null,PM=[],SR=null,PO=false;
const CM=[{d:0,r:180,g:238,b:240},{d:50,r:130,g:215,b:230},{d:100,r:80,g:190,b:220},{d:200,r:45,g:150,b:200},{d:500,r:25,g:100,b:180},{d:1000,r:15,g:60,b:150},{d:2000,r:10,g:35,b:110},{d:3000,r:8,g:20,b:80},{d:5000,r:5,g:12,b:55},{d:11000,r:3,g:5,b:30}];
function dC(d){if(d<=0)return null;for(let i=1;i<CM.length;i++){if(d<=CM[i].d){const a=CM[i-1],b=CM[i],t=(d-a.d)/(b.d-a.d);return[a.r+(b.r-a.r)*t|0,a.g+(b.g-a.g)*t|0,a.b+(b.b-a.b)*t|0]}}const l=CM[CM.length-1];return[l.r,l.g,l.b]}
function gCSS(){return'linear-gradient(90deg,'+CM.slice(0,7).map((c,i)=>`rgb(${c.r},${c.g},${c.b}) ${(i/6*100)|0}%`).join(',')+')'}

// === SINGLE MAP INIT ===
const M=L.map('map',{center:[34.85,138.55],zoom:10,zoomControl:false});
L.control.zoom({position:'bottomleft'}).addTo(M);
const baseD=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© CARTO',maxZoom:19}).addTo(M);
const baseS=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:18});
L.control.layers({"Sombre":baseD,"Satellite":baseS},{},{position:'topleft'}).addTo(M);

function $(id){return document.getElementById(id)}
async function go(){const loc=$('inLoc').value.trim();if(!loc)return T('Entrez un lieu','err');T('Géocodage...','load');$('btnGo').disabled=true;try{const r=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(loc)+'&format=json&limit=1');const d=await r.json();if(!d.length)return T('Lieu non trouvé','err');const{lat,lon,boundingbox:bb}=d[0],bn=bb.map(Number),dLa=Math.max(bn[1]-bn[0],.4)*.7,dLo=Math.max(bn[3]-bn[2],.4)*.7;M.fitBounds([[+lat-dLa,+lon-dLo],[+lat+dLa,+lon+dLo]]);if(SR)M.removeLayer(SR);SR=L.rectangle([[+lat-dLa,+lon-dLo],[+lat+dLa,+lon+dLo]],{color:'#00e5ff',weight:1,fillOpacity:.03,dashArray:'6,4'}).addTo(M);await fPorts([+lat,+lon],Math.max(dLa,dLo));uDS();T('Zone OK — panneau → données.','ok');op()}catch(e){T(e.message,'err')}finally{$('btnGo').disabled=false}}
M.on('moveend',()=>{if(PO)uDS()});

function uDS(){const b=M.getBounds(),s=b.getSouth().toFixed(2),n=b.getNorth().toFixed(2),w=b.getWest().toFixed(2),e=b.getEast().toFixed(2),cs=`Nord:${n}° Sud:${s}° Ouest:${w}° Est:${e}°`,eu=`https://coastwatch.pfeg.noaa.gov/erddap/griddap/etopo180.csv?altitude[(${s}):(${n})][(${w}):(${e})]`;$('dsA').innerHTML=`<div class="ds-card"><h4>🌊 GEBCO <span class="badge" style="background:var(--green);color:var(--bg)">~450m</span></h4><ol class="ds-steps"><li>Ouvrez GEBCO Download</li><li>Coordonnées :</li></ol><div class="cb" onclick="cpy(this,'${cs}')">${cs}<span class="ch">copier</span></div><ol class="ds-steps" start="3"><li>Format <b>Esri ASCII</b></li><li>Glissez le .asc ci-dessous</li></ol><a class="ds-link" href="https://download.gebco.net/" target="_blank">🔗 GEBCO</a></div><div class="ds-card"><h4>🛰 NOAA ERDDAP <span class="badge" style="background:var(--accent);color:var(--bg)">~1.8km</span></h4><a class="ds-link" href="${eu}" target="_blank" download="etopo.csv">⬇ CSV direct</a><div class="cb" onclick="cpy(this,'${eu}')" style="font-size:9px;margin-top:6px">${eu.substring(0,70)}...<span class="ch">copier</span></div></div>`}
function cpy(el,t){navigator.clipboard.writeText(t).then(()=>{el.classList.add('cp');setTimeout(()=>el.classList.remove('cp'),2000);T('Copié','ok')}).catch(()=>{})}

async function fPorts(c,s){PM.forEach(m=>M.removeLayer(m));PM=[];try{const r=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(`[out:json][timeout:12];(node["seamark:type"="harbour"](around:${Math.max(s,.5)*111000},${c[0]},${c[1]});node["leisure"="marina"](around:${Math.max(s,.5)*111000},${c[0]},${c[1]});node["harbour"](around:${Math.max(s,.5)*111000},${c[0]},${c[1]}););out center 30;`)});const d=await r.json();d.elements.forEach(el=>{const lt=el.lat||el.center?.lat,ln=el.lon||el.center?.lon;if(!lt)return;const nm=el.tags?.name||el.tags?.['seamark:name']||'Port';PM.push(L.marker([lt,ln],{icon:L.divIcon({html:'<div style="background:#ffc644;width:9px;height:9px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 5px rgba(255,198,68,.5)"></div>',className:'',iconSize:[13,13],iconAnchor:[6,6]})}).bindPopup('<b>⚓ '+nm+'</b><br>'+lt.toFixed(4)+'°N, '+ln.toFixed(4)+'°E').addTo(M))})}catch(e){}}

// === FILE ===
const dz=$('dz');dz.ondragover=e=>{e.preventDefault();dz.classList.add('ov')};dz.ondragleave=()=>dz.classList.remove('ov');dz.ondrop=e=>{e.preventDefault();dz.classList.remove('ov');if(e.dataTransfer.files.length)pF(e.dataTransfer.files[0])};
function hFile(ev){if(ev.target.files.length)pF(ev.target.files[0])}

// Max grid cells to keep things responsive
const MAX_CELLS=800000;

async function pF(f){
  T('Lecture du fichier ('+((f.size/1e6)|0)+' Mo)...','load');
  await tick();
  try{
    const t=await f.text();
    T('Parsing...','load');await tick();
    if(f.name.toLowerCase().endsWith('.asc')) await pASC(t);
    else await pCSV(t);
    T('Rendu bathymétrie...','load');await tick();
    rBathy();
    T('Extraction isobathe...','load');await tick();
    xIso();
  }catch(e){T('Erreur: '+e.message,'err');console.error(e)}
}
function tick(){return new Promise(r=>setTimeout(r,20))}

// === ASC PARSER — direct to grid, auto-stride ===
async function pASC(t){
  // Parse header
  const hdr={};let dataStart=0;
  const firstLines=t.substring(0,2000).split('\n');
  for(let i=0;i<Math.min(10,firstLines.length);i++){
    const p=firstLines[i].trim().split(/\s+/);
    if(p.length===2&&isNaN(+p[0])){hdr[p[0].toLowerCase()]=+p[1];dataStart+=firstLines[i].length+1}
    else break;
  }
  const nc=hdr.ncols|0,nr=hdr.nrows|0;
  const x0=hdr.xllcorner??hdr.xllcenter;
  const y0=hdr.yllcorner??hdr.yllcenter;
  const cs=hdr.cellsize;
  const nd=hdr.nodata_value??-9999;
  if(!nc||!nr||x0==null||y0==null||!cs)throw new Error('En-tête ASC invalide: ncols='+nc+' nrows='+nr);

  // Auto stride: downsample if too many cells
  const total=nr*nc;
  let stride=1;
  while((Math.ceil(nr/stride)*Math.ceil(nc/stride))>MAX_CELLS)stride++;

  const gnr=Math.ceil(nr/stride),gnc=Math.ceil(nc/stride);
  T('Parsing ASC '+nr+'×'+nc+' (stride='+stride+' → '+gnr+'×'+gnc+')...','load');
  await tick();

  // Build grid directly from text — avoid splitting entire file into array
  const gr=new Float32Array(gnr*gnc).fill(NaN);
  const gla=new Float64Array(gnr);
  const glo=new Float64Array(gnc);

  // Precompute lat/lon arrays
  for(let i=0;i<gnr;i++) gla[i]=y0+(nr-1-i*stride)*cs;
  for(let i=0;i<gnc;i++) glo[i]=x0+i*stride*cs;

  // Parse data rows — scan through text char by char for speed
  let pos=dataStart,row=0,gridRow=0;
  let lastPct=-1;

  while(pos<t.length && row<nr){
    // Skip this row?
    if(row % stride !== 0){
      // Fast-skip to next newline
      while(pos<t.length && t.charCodeAt(pos)!==10) pos++;
      pos++; row++;
      continue;
    }

    // Parse this row — extract values
    let col=0,gridCol=0;
    while(pos<t.length && t.charCodeAt(pos)!==10){
      // Skip whitespace
      while(pos<t.length){const ch=t.charCodeAt(pos);if(ch===32||ch===9||ch===13)pos++;else break}
      if(pos>=t.length||t.charCodeAt(pos)===10)break;

      // Read number
      let numStart=pos;
      while(pos<t.length){const ch=t.charCodeAt(pos);if(ch===32||ch===9||ch===10||ch===13)break;pos++}
      
      if(col % stride === 0 && gridCol < gnc){
        const v=+t.substring(numStart,pos);
        // Only keep underwater (negative elevation)
        if(v!==nd && !isNaN(v) && v<0){
          gr[gridRow*gnc+gridCol]=-v;
        }
        gridCol++;
      }
      col++;
    }
    // Skip newline
    if(pos<t.length) pos++;

    gridRow++;
    row++;

    // Progress every 5%
    const pct=(row/nr*100)|0;
    if(pct%5===0 && pct!==lastPct){lastPct=pct;T('Parsing ASC... '+pct+'%','load');await tick()}
  }

  // Build G structure with typed arrays
  G={la:gla,lo:glo,gr:null,nr:gnr,nc:gnc,flat:gr};
  T(gnr+'×'+gnc+' = '+(gnr*gnc)+' cellules chargées','ok');
}

// === CSV PARSER — optimized for large files ===
async function pCSV(t){
  const lines=t.split('\n');
  let sr=0;
  if(lines[0]&&/[a-zA-Z]/.test(lines[0])){sr=1;if(lines[1]&&/[a-zA-Z]/.test(lines[1]))sr=2}
  
  const dataLen=lines.length-sr;
  // Auto stride
  let stride=1;
  while(Math.ceil(dataLen/stride)>MAX_CELLS)stride++;

  T('Parsing CSV ('+dataLen+' lignes, stride='+stride+')...','load');
  await tick();

  const lats=new Set,lons=new Set;
  const raw=[];
  for(let i=sr;i<lines.length;i+=stride){
    const p=lines[i].split(/[,;\t\s]+/);
    if(p.length<3)continue;
    const a=+p[0],b=+p[1],v=+p[2];
    if(!isFinite(a)||!isFinite(b)||!isFinite(v))continue;
    let la,lo;
    if(Math.abs(a)<=90&&Math.abs(b)>90){la=a;lo=b}else if(Math.abs(b)<=90){la=b;lo=a}else{la=a;lo=b}
    if(v>=0)continue; // only underwater
    raw.push(la,lo,-v);
    lats.add(la);lons.add(lo);

    if(i%50000===0){T('Parsing CSV... '+((i/lines.length*100)|0)+'%','load');await tick()}
  }
  if(!raw.length)throw new Error('Aucun point sous-marin');

  const sla=[...lats].sort((a,b)=>a-b);
  const slo=[...lons].sort((a,b)=>a-b);
  const gnr=sla.length,gnc=slo.length;

  // Build index maps
  const laIdx=new Map;sla.forEach((v,i)=>laIdx.set(v,i));
  const loIdx=new Map;slo.forEach((v,i)=>loIdx.set(v,i));

  const flat=new Float32Array(gnr*gnc).fill(NaN);
  for(let i=0;i<raw.length;i+=3){
    const ri=laIdx.get(raw[i]),ci=loIdx.get(raw[i+1]);
    if(ri!==undefined&&ci!==undefined) flat[ri*gnc+ci]=raw[i+2];
  }

  G={la:new Float64Array(sla),lo:new Float64Array(slo),gr:null,nr:gnr,nc:gnc,flat};
  T(gnr+'×'+gnc+' cellules chargées','ok');
}

// === GRID ACCESS — flat typed array for performance ===
function gAt(r,c){return G.flat[r*G.nc+c]}

// Binary search: find index in sorted Float64Array closest to value
function bSearch(arr,val){
  let lo=0,hi=arr.length-1;
  if(val<=arr[lo])return lo;if(val>=arr[hi])return hi;
  while(hi-lo>1){const mid=(lo+hi)>>1;if(arr[mid]<=val)lo=mid;else hi=mid}
  return(val-arr[lo])<(arr[hi]-val)?lo:hi;
}

// Precompute color lookup table: depth 0..MAX_D → [r,g,b]
let colorLUT=null;
function buildLUT(maxD){
  const n=Math.min(maxD+1,12000);
  colorLUT=new Uint8Array(n*3);
  for(let d=0;d<n;d++){
    const col=dC(d);
    if(col){colorLUT[d*3]=col[0];colorLUT[d*3+1]=col[1];colorLUT[d*3+2]=col[2]}
  }
}

// === BATHYMETRY OVERLAY — Custom L.GridLayer (tile-based, viewport-only) ===
let bathyLayer=null;
let maxDepth=0;

function rBathy(){
  if(!G)return;
  // Compute max depth once
  maxDepth=0;
  const{flat}=G;const len=flat.length;
  for(let i=0;i<len;i++){const v=flat[i];if(v>maxDepth)maxDepth=v}
  buildLUT(Math.ceil(maxDepth));

  if(bathyLayer){M.removeLayer(bathyLayer);bathyLayer=null}

  bathyLayer=L.GridLayer.extend({
    createTile:function(coords){
      const tile=document.createElement('canvas');
      const sz=this.getTileSize();tile.width=sz.x;tile.height=sz.y;
      const ctx=tile.getContext('2d');
      const img=ctx.createImageData(sz.x,sz.y);
      const{la,lo,nr,nc}=G;

      // Tile bounds in lat/lon
      const nw=this._map.unproject([coords.x*sz.x, coords.y*sz.y],coords.z);
      const se=this._map.unproject([(coords.x+1)*sz.x,(coords.y+1)*sz.y],coords.z);
      const latN=nw.lat,latS=se.lat,lonW=nw.lng,lonE=se.lng;

      // Find grid row/col range for this tile using binary search
      const r0=bSearch(la,latS),r1=bSearch(la,latN);
      const c0=bSearch(lo,lonW),c1=bSearch(lo,lonE);
      const rMin=Math.min(r0,r1),rMax=Math.max(r0,r1);
      const cMin=Math.min(c0,c1),cMax=Math.max(c0,c1);

      if(rMax<=rMin||cMax<=cMin){ctx.putImageData(img,0,0);return tile}

      // Map grid cells to tile pixels
      for(let r=rMin;r<=rMax;r++){
        const lat=la[r];
        // Y pixel: map lat to tile pixel
        const py=Math.round((latN-lat)/(latN-latS)*sz.y);
        if(py<0||py>=sz.y)continue;
        for(let c=cMin;c<=cMax;c++){
          const v=G.flat[r*nc+c];
          if(isNaN(v)||v<=0)continue;
          const lon=lo[c];
          const px=Math.round((lon-lonW)/(lonE-lonW)*sz.x);
          if(px<0||px>=sz.x)continue;

          const di=v|0;
          const idx=(py*sz.x+px)*4;
          if(di<colorLUT.length/3){
            img.data[idx]=colorLUT[di*3];
            img.data[idx+1]=colorLUT[di*3+1];
            img.data[idx+2]=colorLUT[di*3+2];
          }
          img.data[idx+3]=110;
        }
      }
      ctx.putImageData(img,0,0);
      return tile;
    }
  });

  const BathyGrid=bathyLayer;
  bathyLayer=new BathyGrid({opacity:.6,updateWhenZooming:false,updateWhenIdle:true}).addTo(M);
  bathyLayer.bringToBack();

  // Legend
  $('dLeg').style.display='block';$('dBar').style.background=gCSS();
  $('dL0').textContent='0m';$('dL1').textContent=(maxDepth/2|0)+'m';$('dL2').textContent=(maxDepth|0)+'m';
  $('lgT').textContent='Isobathe '+(+$('inD').value)+'m';
  $('lgd').style.display='block';uLP();
}
function setOp(v){if(bathyLayer)bathyLayer.setOpacity(v/100)}

// === MARCHING SQUARES — uses flat array ===
function mS(th){
  if(!G)return[];
  const{la,lo,nr,nc}=G;
  const sg=[];
  for(let r=0;r<nr-1;r++){
    for(let c=0;c<nc-1;c++){
      const bl=gAt(r,c),br=gAt(r,c+1),tl=gAt(r+1,c),tr=gAt(r+1,c+1);
      if(isNaN(tl)||isNaN(tr)||isNaN(br)||isNaN(bl))continue;
      let cs=0;if(tl>=th)cs|=8;if(tr>=th)cs|=4;if(br>=th)cs|=2;if(bl>=th)cs|=1;
      if(!cs||cs===15)continue;
      const yB=la[r],yT=la[r+1],xL=lo[c],xR=lo[c+1];
      const lp=(v1,v2,c1,c2)=>Math.abs(v1-v2)<.001?(c1+c2)/2:c1+(th-v1)/(v2-v1)*(c2-c1);
      const TT=[yT,lp(tl,tr,xL,xR)],B=[yB,lp(bl,br,xL,xR)],Le=[lp(bl,tl,yB,yT),xL],R=[lp(br,tr,yB,yT),xR];
      switch(cs){case 1:case 14:sg.push([Le,B]);break;case 2:case 13:sg.push([B,R]);break;case 3:case 12:sg.push([Le,R]);break;case 4:case 11:sg.push([TT,R]);break;case 5:sg.push([Le,TT],[B,R]);break;case 6:case 9:sg.push([TT,B]);break;case 7:case 8:sg.push([Le,TT]);break;case 10:sg.push([Le,B],[TT,R]);break}
    }
  }
  return sg;
}

// === EXTRACT ISOBATH ===
function xIso(){
  if(!G)return;const dep=+$('inD').value;
  const{la,lo,nr,nc}=G;
  if(IL)M.removeLayer(IL);IL=L.layerGroup().addTo(M);
  const sg=mS(dep);
  sg.forEach(s=>L.polyline(s,{color:'#ff3d71',weight:3.5,opacity:1}).addTo(IL));
  const ctr=M.getCenter();
  [50,100,200,500,1000,1500,2000,3000,5000].filter(d=>d!==dep).forEach(d=>{
    const rs=mS(d);if(!rs.length)return;
    rs.forEach(s=>L.polyline(s,{color:'rgba(255,255,255,.3)',weight:1,dashArray:'3,5'}).addTo(IL));
    let best=rs[0],bd=Infinity;rs.forEach(s=>{const dd=Math.abs((s[0][0]+s[1][0])/2-ctr.lat)+Math.abs((s[0][1]+s[1][1])/2-ctr.lng);if(dd<bd){bd=dd;best=s}});
    L.marker([(best[0][0]+best[1][0])/2,(best[0][1]+best[1][1])/2],{icon:L.divIcon({html:'<div style="font:500 9px DM Mono,monospace;color:rgba(255,255,255,.55);white-space:nowrap;text-shadow:0 0 4px #000,0 0 2px #000">'+d+'m</div>',className:'',iconSize:[40,14],iconAnchor:[20,7]})}).addTo(IL)
  });
  sRes(dep,sg);T('Isobathe '+dep+'m : '+sg.length+' segments','ok')
}

function sRes(dep,sg){if(!sg.length){$('rA').innerHTML='<p style="color:var(--accent2);font-size:12px;margin-top:12px">Aucune isobathe trouvée à cette profondeur.</p>';return}
const allLa=sg.flatMap(s=>[s[0][0],s[1][0]]),allLo=sg.flatMap(s=>[s[0][1],s[1][1]]);
const laMin=Math.min(...allLa),laMax=Math.max(...allLa),loMin=Math.min(...allLo),loMax=Math.max(...allLo);
const cLa=(laMin+laMax)/2,cLo=(loMin+loMax)/2;
let h='<div class="sec">Isobathe '+dep+'m</div><div class="st"><span class="sl">Segments</span><span class="sv">'+sg.length+'</span></div><div class="st"><span class="sl">Lat</span><span class="sv">'+laMin.toFixed(4)+'° → '+laMax.toFixed(4)+'°</span></div><div class="st"><span class="sl">Lon</span><span class="sv">'+loMin.toFixed(4)+'° → '+loMax.toFixed(4)+'°</span></div>';
if(PM.length){h+='<div class="sec">Ports proches</div>';PM.map(m=>{const ll=m.getLatLng();return{name:m.getPopup().getContent().match(/<b>⚓ (.+?)<\/b>/)?.[1]||'Port',lat:ll.lat,lon:ll.lng,dist:hv(ll.lat,ll.lng,cLa,cLo)}}).sort((a,b)=>a.dist-b.dist).slice(0,8).forEach(p=>{h+='<div class="pc" onclick="M.setView(['+p.lat+','+p.lon+'],13)"><div class="pn">⚓ '+p.name+'</div><div class="pd">'+p.dist.toFixed(1)+'km · ~'+(p.dist/(12*1.852)*60).toFixed(0)+'min @12kn</div></div>'})}
h+='<div class="sec">Exporter isobathe</div><div class="er"><button class="btn" onclick="eCSV()">CSV</button><button class="btn" onclick="eGJ()">GeoJSON</button><button class="btn" onclick="eKML()">KML</button></div>';$('rA').innerHTML=h}

M.on('click',ev=>{if(!G)return;const{la,lo,nc}=G;const r=bSearch(la,ev.latlng.lat),c=bSearch(lo,ev.latlng.lng);const v=G.flat[r*nc+c];if(v&&!isNaN(v)&&v>0)L.popup().setLatLng(ev.latlng).setContent('<b>Prof: '+v.toFixed(0)+'m</b><br>'+ev.latlng.lat.toFixed(5)+'°N, '+ev.latlng.lng.toFixed(5)+'°E').openOn(M)});

function gSeg(){if(!G)return[];return mS(+$('inD').value)}
function dL(c,f,m){const b=new Blob([c],{type:m}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=f;a.click();URL.revokeObjectURL(a.href)}
function eCSV(){const sg=gSeg(),d=$('inD').value;let s='lat1,lon1,lat2,lon2,depth_m\n';sg.forEach(x=>s+=x[0][0].toFixed(6)+','+x[0][1].toFixed(6)+','+x[1][0].toFixed(6)+','+x[1][1].toFixed(6)+','+d+'\n');dL(s,'isobath_'+d+'m.csv','text/csv')}
function eGJ(){const sg=gSeg(),d=$('inD').value;dL(JSON.stringify({type:'FeatureCollection',features:sg.map(x=>({type:'Feature',geometry:{type:'LineString',coordinates:[[x[0][1],x[0][0]],[x[1][1],x[1][0]]]},properties:{depth:+d}}))},null,2),'isobath_'+d+'m.geojson','application/json')}
function eKML(){const sg=gSeg(),d=$('inD').value;let k='<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>Isobathe '+d+'m</name><Style id="iso"><LineStyle><color>ff3d71ff</color><width>2</width></LineStyle></Style>';sg.forEach(x=>k+='<Placemark><styleUrl>#iso</styleUrl><LineString><coordinates>'+x[0][1].toFixed(6)+','+x[0][0].toFixed(6)+',0 '+x[1][1].toFixed(6)+','+x[1][0].toFixed(6)+',0</coordinates></LineString></Placemark>');k+='</Document></kml>';dL(k,'isobath_'+d+'m.kml','application/vnd.google-earth.kml+xml')}

function hv(a,b,c,d){const R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))}
function T(m,t){const e=$('tst'),s=$('tSp'),x=$('tMsg');e.classList.remove('hi','ok','err');s.style.display=t==='load'?'block':'none';if(t==='ok')e.classList.add('ok');if(t==='err')e.classList.add('err');x.textContent=m;if(t!=='load')setTimeout(()=>e.classList.add('hi'),6000)}
function tp(){PO=!PO;$('pnl').classList.toggle('shut',!PO);uLP();if(PO)uDS()}
function op(){PO=true;$('pnl').classList.remove('shut');uLP()}
function uLP(){$('lgd').classList.toggle('po',PO&&window.innerWidth>768)}
$('inLoc').addEventListener('keyup',e=>{if(e.key==='Enter')go()});
$('inD').addEventListener('keyup',e=>{if(e.key==='Enter'){if(G){$('lgT').textContent='Isobathe '+(+$('inD').value)+'m';xIso()}else go()}});
window.addEventListener('resize',uLP);
T('Entrez un lieu et une profondeur','ok');uDS();
</script>
</body>
